<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperTrader — Bot Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c10;
    --surface:   #0d1117;
    --border:    #1e2730;
    --green:     #00e87a;
    --red:       #ff3b5c;
    --yellow:    #ffd447;
    --blue:      #38bdf8;
    --muted:     #4a5568;
    --text:      #c9d1d9;
    --text-dim:  #6e7681;
    --font-mono: 'Space Mono', monospace;
    --font-head: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100%;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,232,122,.012) 2px, rgba(0,232,122,.012) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 200;
    gap: 10px;
  }
  .logo { font-family: var(--font-head); font-size: 18px; letter-spacing: -.5px; white-space: nowrap; }
  .logo span { color: var(--green); }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  .last-scan { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 11px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    border: 1px solid; white-space: nowrap; transition: all .3s;
  }
  .status-pill.running  { color: var(--green);  border-color: var(--green);  background: rgba(0,232,122,.08); }
  .status-pill.stopped  { color: var(--muted);   border-color: var(--border); }
  .status-pill.scanning { color: var(--yellow);  border-color: var(--yellow); background: rgba(255,212,71,.08); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .dot.pulse { animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* MOBILE TAB BAR */
  .tab-bar {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 53px; z-index: 190;
    overflow-x: auto; scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-bar-inner { display: flex; min-width: max-content; }
  .tab-btn {
    padding: 10px 18px;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-dim); font-family: var(--font-mono); font-size: 11px;
    font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer; white-space: nowrap; transition: color .15s, border-color .15s;
  }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

  /* MAIN 3-COL LAYOUT */
  .main-layout {
    display: grid;
    grid-template-columns: 260px 1fr 300px;
    gap: 1px;
    background: var(--border);
    min-height: calc(100vh - 53px);
  }

  /* PANEL */
  .panel {
    background: var(--surface);
    padding: 18px;
    overflow: auto;
    min-width: 0;
  }
  .panel-title {
    font-family: var(--font-head);
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 14px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* ALPACA STATUS */
  .alpaca-status {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 16px;
    font-size: 11px;
  }
  .alpaca-status-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .alpaca-status-title {
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 700;
  }
  .alpaca-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px; border-radius: 999px; font-size: 10px;
    font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    border: 1px solid; transition: all .3s;
  }
  .alpaca-badge.connected    { color: var(--green);  border-color: var(--green);  background: rgba(0,232,122,.08); }
  .alpaca-badge.disconnected { color: var(--red);    border-color: var(--red);    background: rgba(255,59,92,.08); }
  .alpaca-badge.internal     { color: var(--yellow); border-color: var(--yellow); background: rgba(255,212,71,.08); }
  .alpaca-badge.checking     { color: var(--muted);  border-color: var(--border); }
  .alpaca-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .alpaca-row {
    display: flex; justify-content: space-between;
    padding: 3px 0; border-bottom: 1px solid var(--border); color: var(--text-dim);
  }
  .alpaca-row:last-child { border-bottom: none; }
  .alpaca-row-val { color: var(--text); font-weight: 700; }
  .alpaca-row-val.green { color: var(--green); }
  .alpaca-row-val.red   { color: var(--red); }
  .alpaca-error {
    color: var(--red); font-size: 10px; line-height: 1.5;
    margin-top: 4px; word-break: break-word;
  }
  .alpaca-recheck {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 11px; padding: 0;
    font-family: var(--font-mono); transition: color .15s;
  }
  .alpaca-recheck:hover { color: var(--blue); }

  /* PORTFOLIO STATS */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .stat-label { color: var(--text-dim); font-size: 10px; margin-bottom: 3px; }
  .stat-value { font-size: 16px; font-weight: 700; letter-spacing: -.3px; word-break: break-all; }
  .stat-value.green { color: var(--green); }
  .stat-value.red   { color: var(--red); }

  /* BUTTONS */
  .btn {
    display: block; width: 100%; padding: 9px 0; margin-bottom: 8px;
    border: 1px solid; border-radius: 4px;
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    letter-spacing: .06em; cursor: pointer; transition: all .15s; text-transform: uppercase;
  }
  .btn-green { background: transparent; color: var(--green); border-color: var(--green); }
  .btn-green:hover { background: rgba(0,232,122,.12); }
  .btn-red   { background: transparent; color: var(--red);   border-color: var(--red); }
  .btn-red:hover   { background: rgba(255,59,92,.12); }
  .btn-blue  { background: transparent; color: var(--blue);  border-color: var(--blue); }
  .btn-blue:hover  { background: rgba(56,189,248,.12); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-row .btn { margin-bottom: 0; }
  .btn-row .btn-wide { grid-column: span 2; }

  /* INPUTS */
  .ticker-input {
    width: 100%; padding: 8px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: var(--font-mono); font-size: 12px;
    margin-bottom: 8px; resize: vertical;
  }
  .ticker-input:focus { outline: none; border-color: var(--green); }
  .cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cfg-row { margin-bottom: 12px; }
  .cfg-label { color: var(--text-dim); font-size: 11px; margin-bottom: 4px; display: block; }
  .cfg-input {
    width: 100%; padding: 7px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: var(--font-mono); font-size: 12px;
  }
  .cfg-input:focus { outline: none; border-color: var(--blue); }

  /* SIGNAL FEED */
  .signal-row {
    display: grid;
    grid-template-columns: 60px 74px 58px 58px 1fr;
    gap: 8px; align-items: start;
    padding: 9px 0; border-bottom: 1px solid var(--border);
    font-size: 11px; animation: fadeSlide .35s ease;
  }
  @keyframes fadeSlide { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:none} }
  .signal-row:last-child { border-bottom: none; }
  .signal-time   { color: var(--text-dim); }
  .signal-ticker { font-weight: 700; color: var(--blue); }
  .signal-type {
    font-weight: 700; padding: 2px 6px; border-radius: 3px;
    font-size: 10px; text-align: center;
  }
  .sig-BUY  { background: rgba(0,232,122,.15);  color: var(--green); }
  .sig-SELL { background: rgba(255,59,92,.15);   color: var(--red); }
  .sig-HOLD { background: rgba(255,212,71,.12);  color: var(--yellow); }
  .sig-SKIP { background: rgba(110,118,129,.12); color: var(--muted); }
  .signal-conf   { color: var(--text-dim); }
  .signal-reason { color: var(--text-dim); font-size: 10px; line-height: 1.5; }
  .signal-source { color: var(--muted); font-size: 10px; }
  .feed-header {
    display: grid;
    grid-template-columns: 60px 74px 58px 58px 1fr;
    gap: 8px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim); font-size: 10px;
    letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px;
  }

  /* RIGHT COL */
  .right-col { display: flex; flex-direction: column; gap: 1px; background: var(--border); }
  .right-col .panel { flex: 1; min-height: 180px; }
  .trending-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .trending-row:last-child { border-bottom: none; }
  .trending-ticker { color: var(--blue); font-weight: 700; }
  .trending-bar-wrap { flex: 1; margin: 0 10px; height: 3px; background: var(--border); border-radius: 2px; }
  .trending-bar { height: 100%; background: var(--green); border-radius: 2px; transition: width .5s; }
  .trending-count { color: var(--text-dim); font-size: 11px; }
  .position-row {
    display: grid; grid-template-columns: 1fr auto;
    gap: 8px; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .position-row:last-child { border-bottom: none; }
  .pos-ticker { font-weight: 700; color: var(--blue); }
  .pos-qty    { color: var(--text-dim); font-size: 11px; }
  .pos-pnl    { font-weight: 700; }
  .pos-pnl.pos { color: var(--green); }
  .pos-pnl.neg { color: var(--red); }

  .empty { text-align: center; color: var(--text-dim); padding: 32px 0; font-size: 12px; }
  .empty-icon { font-size: 28px; display: block; margin-bottom: 8px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 20px; right: 16px; left: 16px;
    max-width: 380px; margin: auto;
    padding: 11px 18px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 12px; opacity: 0; transform: translateY(8px);
    transition: all .22s; z-index: 9999; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok  { border-color: var(--green); color: var(--green); }
  #toast.err { border-color: var(--red);   color: var(--red); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ═══════════════════════════════════════
     RESPONSIVE
  ═══════════════════════════════════════ */

  /* Tablet ≤1024px: drop right col into "Market" tab */
  @media (max-width: 1024px) {
    .main-layout { grid-template-columns: 240px 1fr; }
    .right-col { display: none; }
    .tab-bar { display: block; }
    /* When "Market" tab is active, show right-col as full row */
    .right-col.tab-active {
      display: flex; flex-direction: row;
      grid-column: span 2;
    }
    .right-col.tab-active .panel { flex: 1; }
  }

  /* Small tablet ≤720px: stack all panels, show one at a time via tabs */
  @media (max-width: 720px) {
    .main-layout {
      grid-template-columns: 1fr;
      min-height: unset;
      background: none;
      gap: 0;
    }
    .left-panel,
    .center-panel { display: none; }
    .left-panel.tab-active,
    .center-panel.tab-active { display: block; }

    .right-col { display: none; flex-direction: column; background: none; gap: 0; }
    .right-col.tab-active { display: flex; }
    .right-col .panel { flex: unset; min-height: unset; }
    .right-col .panel + .panel { border-top: 1px solid var(--border); }

    /* Compact signal rows on mobile */
    .feed-header { display: none; }
    .signal-row {
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto auto;
      gap: 4px 8px;
    }
    .signal-ticker { order: 1; font-size: 13px; }
    .signal-time   { order: 2; text-align: right; font-size: 10px; }
    .signal-type   { order: 3; justify-self: start; }
    .signal-conf   { order: 4; text-align: right; }
    .signal-reason { order: 5; grid-column: span 2; font-size: 10px; }
  }

  /* Mobile ≤420px */
  @media (max-width: 420px) {
    header { padding: 10px 14px; }
    .logo { font-size: 15px; }
    .last-scan { display: none; }
    .panel { padding: 14px; }
    .stat-value { font-size: 14px; }
    .cfg-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Paper<span>Trader</span></div>
  <div class="header-right">
    <span class="last-scan" id="lastScan">–</span>
    <span class="status-pill stopped" id="statusPill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">STOPPED</span>
    </span>
  </div>
</header>

<nav class="tab-bar" id="tabBar" role="tablist" aria-label="Dashboard sections">
  <div class="tab-bar-inner">
    <button class="tab-btn active" data-tab="left"   onclick="switchTab('left')">Controls</button>
    <button class="tab-btn"        data-tab="center" onclick="switchTab('center')">Signals</button>
    <button class="tab-btn"        data-tab="right"  onclick="switchTab('right')">Market</button>
  </div>
</nav>

<div class="main-layout" id="mainLayout">

  <!-- LEFT: Controls -->
  <div class="panel left-panel tab-active" id="tab-left">

    <!-- ALPACA CONNECTION STATUS -->
    <div class="alpaca-status" id="alpacaStatusBox">
      <div class="alpaca-status-header">
        <span class="alpaca-status-title">Alpaca API</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="alpaca-recheck" onclick="checkAlpaca()" title="Re-check connection">↺</button>
          <span class="alpaca-badge checking" id="alpacaBadge">
            <span class="alpaca-dot"></span>
            <span id="alpacaBadgeText">Checking…</span>
          </span>
        </div>
      </div>
      <div id="alpacaDetails">
        <div class="alpaca-row"><span>Mode</span><span class="alpaca-row-val" id="alpacaMode">—</span></div>
        <div class="alpaca-row"><span>Cash</span><span class="alpaca-row-val green" id="alpacaCash">—</span></div>
        <div class="alpaca-row"><span>Equity</span><span class="alpaca-row-val" id="alpacaEquity">—</span></div>
        <div class="alpaca-row"><span>Buying power</span><span class="alpaca-row-val" id="alpacaBP">—</span></div>
        <div class="alpaca-row"><span>Acct status</span><span class="alpaca-row-val" id="alpacaAcctStatus">—</span></div>
      </div>
      <div class="alpaca-error" id="alpacaError" style="display:none;"></div>
    </div>

    <div class="panel-title">Portfolio</div>
    <div class="stat-grid">
      <div><div class="stat-label">Cash</div><div class="stat-value" id="cash">$—</div></div>
      <div><div class="stat-label">Value</div><div class="stat-value" id="totalValue">$—</div></div>
      <div><div class="stat-label">PnL</div><div class="stat-value" id="pnl">$—</div></div>
    </div>

    <hr class="divider">
    <div class="panel-title">Controls</div>
    <div class="btn-row">
      <button class="btn btn-green" id="btnStart" onclick="startBot()">▶ Start</button>
      <button class="btn btn-red"   id="btnStop"  onclick="stopBot()" disabled>■ Stop</button>
      <button class="btn btn-blue btn-wide" id="btnScan" onclick="runScan()">↺ Run Scan Once</button>
    </div>

    <hr class="divider">
    <div class="panel-title">Watchlist</div>
    <textarea class="ticker-input" id="watchlistInput" rows="5"
      placeholder="$NVDA&#10;$TSLA&#10;$AAPL">$NVDA&#10;$TSLA&#10;$AAPL&#10;$MSFT&#10;$AMZN&#10;$META&#10;$GOOGL&#10;$AMD&#10;$PLTR&#10;$COIN</textarea>
    <button class="btn btn-blue" onclick="updateWatchlist()">↑ Update Watchlist</button>

    <hr class="divider">
    <div class="panel-title">Config</div>
    <div class="cfg-grid">
      <div class="cfg-row">
        <label class="cfg-label">Interval (min)</label>
        <input class="cfg-input" id="cfgInterval" type="number" value="15" min="1">
      </div>
      <div class="cfg-row">
        <label class="cfg-label">Sentiment Thresh.</label>
        <input class="cfg-input" id="cfgThreshold" type="number" value="0.30" step="0.05" min="0" max="1">
      </div>
      <div class="cfg-row">
        <label class="cfg-label">Daily DD Limit</label>
        <input class="cfg-input" id="cfgDailyDD" type="number" value="0.03" step="0.01" min="0" max="1">
      </div>
      <div class="cfg-row">
        <label class="cfg-label">Total DD Limit</label>
        <input class="cfg-input" id="cfgTotalDD" type="number" value="0.10" step="0.01" min="0" max="1">
      </div>
    </div>
    <button class="btn btn-blue" onclick="saveConfig()">↑ Save Config</button>
  </div>

  <!-- CENTER: Signals -->
  <div class="panel center-panel" id="tab-center">
    <div class="panel-title">
      Signal Feed
      <span id="signalCount" style="color:var(--text-dim);font-size:10px;margin-left:8px;"></span>
    </div>
    <div class="feed-header">
      <span>Time</span><span>Ticker</span><span>Signal</span><span>Conf</span><span>Reasoning</span>
    </div>
    <div id="signalList">
      <div class="empty"><span class="empty-icon">📡</span>Awaiting signals…</div>
    </div>
  </div>

  <!-- RIGHT: Trending + Positions -->
  <div class="right-col" id="tab-right">
    <div class="panel">
      <div class="panel-title">Trending Tickers</div>
      <div id="trendingList">
        <div class="empty"><span class="empty-icon">📈</span>No data yet</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Open Positions</div>
      <div id="positionList">
        <div class="empty"><span class="empty-icon">💼</span>No positions</div>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// Tab switching
function switchTab(name) {
  ['left','center','right'].forEach(t => {
    const el  = document.getElementById('tab-' + t);
    const btn = document.querySelector(`.tab-btn[data-tab="${t}"]`);
    if (el)  el.classList.toggle('tab-active',  t === name);
    if (btn) btn.classList.toggle('active', t === name);
  });
}

// API
async function api(method, path, body) {
  try {
    const opts = { method, headers: {} };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    return await (await fetch(path, opts)).json();
  } catch (e) { return { error: String(e) }; }
}

// Toast
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3500);
}

// Controls
async function startBot() {
  const r = await api('POST', '/api/start');
  r.ok ? (toast('▶ Bot loop started'), startPoll()) : toast(r.message || r.error, 'err');
}
async function stopBot() {
  const r = await api('POST', '/api/stop');
  toast(r.ok ? '■ Loop stopping…' : (r.message || r.error), r.ok ? 'ok' : 'err');
}
async function runScan() {
  const btn = document.getElementById('btnScan');
  btn.disabled = true; btn.textContent = '↺ Scanning…'; setStatus('scanning');
  const r = await api('POST', '/api/scan');
  btn.disabled = false; btn.textContent = '↺ Run Scan Once';
  r.ok ? (toast('✓ Scan complete'), render(await api('GET', '/api/status'))) : toast(r.error || 'Scan failed', 'err');
  setStatus('stopped');
}
async function updateWatchlist() {
  const raw = document.getElementById('watchlistInput').value;
  const tickers = raw.split(/[\n,]+/).map(t => t.trim().toUpperCase()).filter(Boolean);
  if (!tickers.length) return toast('Enter at least one ticker', 'err');
  const r = await api('POST', '/api/watchlist', { tickers });
  r.ok ? toast(`✓ Watchlist updated (${tickers.length} tickers)`) : toast(r.error, 'err');
}
async function saveConfig() {
  const r = await api('POST', '/api/config', {
    interval_minutes:     parseFloat(document.getElementById('cfgInterval').value)  || 15,
    sentiment_threshold:  parseFloat(document.getElementById('cfgThreshold').value) || 0.30,
    daily_drawdown_limit: parseFloat(document.getElementById('cfgDailyDD').value)   || 0.03,
    total_drawdown_limit: parseFloat(document.getElementById('cfgTotalDD').value)   || 0.10,
  });
  r.ok ? toast('✓ Config saved') : toast(r.error, 'err');
}

// Render
function fmt(n) {
  if (n == null) return '—';
  return '$' + parseFloat(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function pct(n) { return n == null ? '—' : (parseFloat(n) * 100).toFixed(1) + '%'; }

function setStatus(s) {
  document.getElementById('statusPill').className = `status-pill ${s}`;
  document.getElementById('statusDot').className  = `dot${s === 'stopped' ? '' : ' pulse'}`;
  document.getElementById('statusText').textContent = s.toUpperCase();
  document.getElementById('btnStart').disabled = (s === 'running');
  document.getElementById('btnStop').disabled  = (s !== 'running');
  document.getElementById('btnScan').disabled  = (s === 'running' || s === 'scanning');
}

function render(data) {
  if (!data) return;
  setStatus(data.running ? 'running' : 'stopped');
  if (data.last_scan) document.getElementById('lastScan').textContent = 'Last: ' + data.last_scan;

  const p = data.portfolio || {};
  document.getElementById('cash').textContent       = fmt(p.cash);
  document.getElementById('totalValue').textContent = fmt(p.total_value ?? p.cash);
  const pnlEl  = document.getElementById('pnl');
  const pnlVal = p.unrealised_pnl ?? p.pnl ?? 0;
  pnlEl.textContent = (pnlVal >= 0 ? '+' : '') + fmt(pnlVal);
  pnlEl.className   = 'stat-value ' + (pnlVal >= 0 ? 'green' : 'red');

  const sigs = data.signals || [];
  document.getElementById('signalCount').textContent = sigs.length ? `(${sigs.length})` : '';
  document.getElementById('signalList').innerHTML = !sigs.length
    ? `<div class="empty"><span class="empty-icon">📡</span>Awaiting signals…</div>`
    : [...sigs].reverse().map(s => `
        <div class="signal-row">
          <span class="signal-time">${s.time||''}</span>
          <span class="signal-ticker">${s.ticker||''}</span>
          <span class="signal-type sig-${s.signal||'SKIP'}">${s.signal||'–'}</span>
          <span class="signal-conf">${s.confidence!=null?pct(s.confidence):'–'}</span>
          <span class="signal-reason">${(s.reasoning||'').substring(0,120)}<br>
            <span class="signal-source">${s.source||''}</span></span>
        </div>`).join('');

  const tEntries = Object.entries(data.trending||{}).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxM = tEntries[0]?.[1] || 1;
  document.getElementById('trendingList').innerHTML = !tEntries.length
    ? `<div class="empty"><span class="empty-icon">📈</span>No data yet</div>`
    : tEntries.map(([t,c]) => `
        <div class="trending-row">
          <span class="trending-ticker">${t}</span>
          <div class="trending-bar-wrap"><div class="trending-bar" style="width:${Math.round(c/maxM*100)}%"></div></div>
          <span class="trending-count">${c}</span>
        </div>`).join('');

  const posEntries = Object.entries(p.positions||{});
  document.getElementById('positionList').innerHTML = !posEntries.length
    ? `<div class="empty"><span class="empty-icon">💼</span>No open positions</div>`
    : posEntries.map(([sym,pos]) => {
        const pnl = pos.unrealised_pnl ?? pos.pnl ?? 0;
        return `<div class="position-row">
          <div><div class="pos-ticker">${sym}</div>
               <div class="pos-qty">${pos.qty??pos.shares??'?'} @ ${fmt(pos.avg_cost??pos.entry_price)}</div></div>
          <div class="pos-pnl ${pnl>=0?'pos':'neg'}">${(pnl>=0?'+':'')+fmt(pnl)}</div>
        </div>`;
      }).join('');
}

// Alpaca connection check
async function checkAlpaca() {
  const badge    = document.getElementById('alpacaBadge');
  const badgeTxt = document.getElementById('alpacaBadgeText');
  const errEl    = document.getElementById('alpacaError');
  badgeTxt.textContent = 'Checking…';
  badge.className = 'alpaca-badge checking';
  errEl.style.display = 'none';

  const r = await api('GET', '/api/alpaca_status');
  if (!r || r.error === undefined && r.connected === undefined) {
    badgeTxt.textContent = 'Unreachable';
    badge.className = 'alpaca-badge disconnected';
    return;
  }

  if (r.connected) {
    badge.className = 'alpaca-badge connected';
    badgeTxt.textContent = r.mode === 'paper' ? 'Paper ✓' : 'Live ✓';
    const acct = r.account || {};
    const fmt2 = v => v != null ? '$' + parseFloat(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';
    document.getElementById('alpacaMode').textContent        = r.mode === 'paper' ? 'Paper trading' : '🔴 LIVE trading';
    document.getElementById('alpacaCash').textContent        = fmt2(acct.cash);
    document.getElementById('alpacaEquity').textContent      = fmt2(acct.equity);
    document.getElementById('alpacaBP').textContent          = fmt2(acct.buying_power);
    const statusEl = document.getElementById('alpacaAcctStatus');
    const rawStatus = acct.status || '—';
    const cleanStatus = rawStatus.includes('.') ? rawStatus.split('.').pop() : rawStatus;
    statusEl.textContent = cleanStatus;
    statusEl.className   = 'alpaca-row-val ' + (cleanStatus === 'ACTIVE' ? 'green' : 'red');
    errEl.style.display  = 'none';
  } else {
    badge.className      = r.mode === 'internal' ? 'alpaca-badge internal' : 'alpaca-badge disconnected';
    badgeTxt.textContent = r.mode === 'internal' ? 'Not connected' : 'Error';
    document.getElementById('alpacaMode').textContent       = r.mode === 'internal' ? 'Internal paper' : r.mode || '—';
    document.getElementById('alpacaCash').textContent       = '—';
    document.getElementById('alpacaEquity').textContent     = '—';
    document.getElementById('alpacaBP').textContent         = '—';
    document.getElementById('alpacaAcctStatus').textContent = '—';
    document.getElementById('alpacaAcctStatus').className   = 'alpaca-row-val';
    errEl.textContent    = r.error || 'Unknown error';
    errEl.style.display  = 'block';
  }
}

// Polling
let pollTimer = null;
async function poll() { render(await api('GET', '/api/status')); }
function startPoll() {
  clearInterval(pollTimer);
  poll();
  checkAlpaca();   // check Alpaca on every start
  pollTimer = setInterval(poll, 5000);
}
startPoll();
</script>
